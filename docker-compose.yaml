services:
  todoapp-postgres:
    image: postgres:18.1-bookworm
    container_name: todoapp-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./out/pgdata:/var/lib/postgresql
    restart: always

  todoapp-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ./migrations:/migrations
    command: ["-path", "/migrations", "-database", "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@todoapp-postgres:5432/${POSTGRES_DB}?sslmode=disable", "up"]
    depends_on:
      - todoapp-postgres

  todoapp-postgres-port-forwarder:
    image: alpine/socat:latest
    container_name: todoapp-postgres-port-forwarder
    command: TCP-LISTEN:5432,fork,reuseaddr TCP-CONNECT:todoapp-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"
    depends_on:
      - todoapp-postgres
    restart: always